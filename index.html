<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="01.png">
  <title>漸層文字產生器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 載入自訂字型 */
    @font-face {
      font-family: 'GenSenRounded';
      src: url('GenSenRounded2TW-H.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    /* 針對操作優化的樣式 - 特別考慮長輩操作 */
    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      background-color: #f3f4f6;
    }
    
    /* 加大滑桿的操作區域，方便手指點選 */
    input[type=range] {
      height: 40px; 
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 32px;
      width: 32px;
      border-radius: 50%;
      background: #3b82f6;
      cursor: pointer;
      margin-top: -12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.4);
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 10px;
      cursor: pointer;
      background: #d1d5db;
      border-radius: 5px;
    }
    
    /* 加大顏色選擇器 */
    input[type="color"] {
      height: 60px;
      width: 100%;
      padding: 2px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      cursor: pointer;
    }

    /* 畫布背景 */
    .canvas-container {
      background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%), 
                        linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #e5e7eb 75%), 
                        linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      background-color: white;
      min-height: 300px;
    }

    /* 增加控制項文字的可讀性 */
    label {
      font-weight: 600;
      color: #374151;
    }
  </style>
</head>
<body class="text-gray-800">

  <!-- 標題區 -->
  <header class="bg-blue-600 text-white p-6 text-center shadow-lg">
    <h1 class="text-3xl md:text-5xl font-bold tracking-wide">💛 漸層文字產生器 💛</h1>
    <p class="mt-2 text-blue-100 text-lg">大字體、好操作、更清晰</p>
  </header>

  <div class="container mx-auto p-4 max-w-6xl">
    
    <div class="flex flex-col lg:flex-row gap-8">
      
      <!-- 左側:控制面板 -->
      <div class="w-full lg:w-1/2 space-y-6">
        
        <!-- 卡片 1: 文字輸入 -->
        <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-200">
          <h2 class="text-2xl font-bold mb-4 text-blue-700 border-b pb-2 flex items-center">
            <span class="text-3xl mr-2">1️⃣</span> 輸入文字
          </h2>
          <div class="space-y-4">
            <div>
              <label class="block text-xl mb-2">請輸入想要顯示的文字:</label>
              <textarea id="textInput" rows="3" class="w-full p-4 text-2xl border-2 border-gray-300 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition" placeholder="例如:早安你好\n平安喜樂" oninput="generateLogo()">早安你好&#10;平安喜樂</textarea>
            </div>
            
            <div>
              <label class="block text-xl mb-2">選擇字型 (選填):</label>
              <input type="file" id="fontUpload" accept=".ttf,.otf" class="block w-full text-lg text-gray-500 file:mr-4 file:py-3 file:px-6 file:rounded-full file:border-0 file:text-lg file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition cursor-pointer">
              <p style="color: #666; font-size: 1rem; margin-top: 5px;">💡 預設使用「源泉圓體」大字</p>
            </div>
          </div>
        </div>

        <!-- 卡片 2: 顏色設定 -->
        <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-200">
          <h2 class="text-2xl font-bold mb-4 text-orange-600 border-b pb-2 flex items-center">
            <span class="text-3xl mr-2">2️⃣</span> 配色與效果
          </h2>
          
          <div class="space-y-6">
            <div>
              <label class="block text-xl mb-2">選擇推薦配色 (為長輩精選):</label>
              <select id="suggestedGradient" onchange="applySuggestedGradient(this.value)" class="w-full p-4 text-xl border-2 border-gray-300 rounded-xl bg-white focus:border-orange-500 outline-none">
                <option value="">-- 請選擇漂亮的配色 --</option>
              </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-lg mb-2">漸層顏色數量:</label>
                <select id="colorStopCount" onchange="updateColorPickers(); generateLogo();" class="w-full p-3 text-lg border-2 border-gray-300 rounded-xl bg-white">
                  <option value="2">2 個顏色</option>
                  <option value="3" selected>3 個顏色</option>
                  <option value="4">4 個顏色</option>
                  <option value="5">5 個顏色</option>
                </select>
              </div>
              
              <div>
                <label class="block text-lg mb-2">漸層風格:</label>
                <select id="gradientType" onchange="generateLogo()" class="w-full p-3 text-lg border-2 border-gray-300 rounded-xl bg-white">
                  <option value="linear">一般漸層 (線性)</option>
                  <option value="radial">圓形漸層 (放射)</option>
                </select>
              </div>
            </div>

            <div>
              <label class="block text-lg mb-2">自訂顏色 (點擊方塊修改):</label>
              <div id="colorPickers" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4">
                <!-- JS 動態生成 -->
              </div>
            </div>

            <div>
              <label class="block text-lg mb-2">漸層方向:<span id="angleValue" class="text-blue-600 font-bold ml-2">0</span>°</label>
              <input type="range" id="gradientAngle" value="0" min="0" max="360" oninput="document.getElementById('angleValue').innerText=this.value; generateLogo()">
            </div>
            
            <div class="border-2 border-orange-200 rounded-xl p-4 bg-orange-50">
              <div class="flex items-center space-x-3">
                <input type="checkbox" id="autoFitGradient" checked oninput="generateLogo()" class="w-8 h-8 text-orange-600 rounded focus:ring-orange-500 border-gray-300 cursor-pointer">
                <label for="autoFitGradient" class="text-xl font-medium cursor-pointer select-none">自動對齊文字 (效果最好)</label>
              </div>
            </div>
          </div>
        </div>

        <!-- 卡片 3: 外觀微調 -->
        <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-200">
          <h2 class="text-2xl font-bold mb-4 text-purple-600 border-b pb-2 flex items-center">
            <span class="text-3xl mr-2">3️⃣</span> 大小與邊框
          </h2>
          
          <div class="space-y-6">
            <div>
              <label class="block text-xl mb-2">文字大小:</label>
              <input type="range" id="fontSize" value="120" min="40" max="250" oninput="generateLogo()">
            </div>

            <div>
              <label class="block text-xl mb-2">行與行的距離:<span id="lineHeightValue" class="text-blue-600 font-bold ml-2">1.3</span>倍</label>
              <input type="range" id="lineHeight" value="1.3" min="0.8" max="3.0" step="0.1" oninput="document.getElementById('lineHeightValue').innerText=this.value; generateLogo()">
            </div>

            <!-- 多層邊框設定 -->
            <div class="border-2 border-purple-200 rounded-xl p-4 bg-purple-50">
              <div class="flex justify-between items-center mb-3">
                <label class="text-xl font-bold text-purple-700">文字邊框設定</label>
                <button onclick="addBorderLayer()" class="px-5 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-xl text-lg font-medium transition">
                  ➕ 新增一圈
                </button>
              </div>
              <div id="borderLayers" class="space-y-3">
                <!-- 動態生成邊框層 -->
              </div>
              <p class="text-sm text-gray-600 mt-2">💡 小提示：最下面的邊框會出現在最外圈。</p>
            </div>

            <div class="flex items-center space-x-3 p-4 bg-gray-50 rounded-xl border border-gray-200">
              <input type="checkbox" id="toggleShadow" oninput="generateLogo()" class="w-8 h-8 text-blue-600 rounded focus:ring-blue-500 border-gray-300 cursor-pointer">
              <label for="toggleShadow" class="text-xl font-bold cursor-pointer select-none">開啟立體陰影 </label>
            </div>
          </div>
        </div>

      </div>

      <!-- 右側:預覽與下載 -->
      <div class="w-full lg:w-1/2 lg:sticky lg:top-4 h-fit">
        <div class="bg-white p-6 rounded-2xl shadow-xl border-2 border-blue-100">
          <h2 class="text-2xl font-bold mb-4 text-center text-gray-800">
            <span class="text-3xl mr-2">👁️</span>效果預覽
          </h2>
          
          <div class="canvas-container rounded-xl overflow-hidden shadow-inner mb-6 border border-gray-300">
            <canvas id="logoCanvas" class="w-full h-auto"></canvas>
          </div>

          <div class="space-y-4">
            <h3 class="text-2xl font-bold text-green-700 flex items-center border-b pb-2">
              <span class="text-3xl mr-2">💾</span>下載成圖片
            </h3>
            
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-lg mb-1">寬度 (像素):</label>
                <input type="number" id="downloadWidth" value="500" class="w-full p-3 text-xl border-2 border-gray-300 rounded-lg">
              </div>
              <div>
                <label class="block text-lg mb-1">高度 (像素):</label>
                <input type="number" id="downloadHeight" value="500" class="w-full p-3 text-xl border-2 border-gray-300 rounded-lg">
              </div>
            </div>

            <button onclick="downloadPNG()" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white py-5 px-6 rounded-2xl text-2xl font-bold shadow-lg hover:shadow-xl transition-all transform hover:scale-105 active:scale-95 flex items-center justify-center space-x-3">
              <span class="text-3xl">💾</span>
              <span>存成圖片下載</span>
            </button>
            
            <p class="text-base text-gray-600 text-center font-medium mt-4">祝您使用愉快！天天開心！</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    let uploadedFont = null;
    let borderLayers = [];

    // --- 擴充建議配色 (針對長輩喜好優化) ---
    const suggestedGradients = {
      "吉祥如意(紅金)": ["#e63946", "#f1faee", "#ffb703"],
      "金碧輝煌(純金)": ["#bf953f", "#fcf6ba", "#b38728", "#fbf5b7", "#aa771c"],
      "福祿長青(深綠)": ["#134e4a", "#10b981", "#ecfdf5"],
      "富貴花開(桃粉)": ["#db2777", "#fdf2f8", "#f472b6"],
      "海闊天空(深藍)": ["#1e3a8a", "#3b82f6", "#dbeafe"],
      "紫氣東來(深紫)": ["#581c87", "#a855f7", "#f3e8ff"],
      "彩虹賀卡(七彩)": ["#ff0000", "#ff7f00", "#ffff00", "#00ff00", "#0000ff", "#4b0082", "#8b00ff"],
      "夕陽餘暉(暖橙)": ["#f97316", "#fbbf24", "#fffbeb"],
      "高對比黑黃(最清晰)": ["#000000", "#ffff00", "#000000"],
      "喜慶大紅(單色感)": ["#7f1d1d", "#ef4444", "#fee2e2"]
    };

    function initSuggestedGradients() {
      const select = document.getElementById('suggestedGradient');
      for (const [name, colors] of Object.entries(suggestedGradients)) {
        const option = document.createElement('option');
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      }
    }

    function applySuggestedGradient(name) {
      if (!name) return;
      const colors = suggestedGradients[name];
      document.getElementById('colorStopCount').value = colors.length;
      updateColorPickers();
      const colorInputs = document.querySelectorAll('.colorInput');
      colorInputs.forEach((input, index) => {
        if (index < colors.length) input.value = colors[index];
      });
      generateLogo();
    }

    // --- 字型上傳功能 ---
    document.getElementById('fontUpload').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          const fontData = event.target.result;
          const fontName = file.name.replace(/\.[^/.]+$/, "");
          const newFont = new FontFace(fontName, `url(${fontData})`);
          newFont.load().then(function(loadedFont) {
            document.fonts.add(loadedFont);
            uploadedFont = fontName;
            generateLogo();
          }).catch(err => console.error('字型載入失敗'));
        };
        reader.readAsDataURL(file);
      }
    });

    function updateColorPickers() {
      const count = parseInt(document.getElementById('colorStopCount').value);
      const container = document.getElementById('colorPickers');
      container.innerHTML = '';
      const defaultColors = ["#e63946", "#ffb703", "#10b981", "#3b82f6", "#a855f7"];
      for (let i = 0; i < count; i++) {
        const colorDiv = document.createElement('div');
        colorDiv.className = 'flex flex-col items-center';
        const input = document.createElement('input');
        input.type = 'color';
        input.className = 'colorInput';
        input.value = defaultColors[i % defaultColors.length];
        input.oninput = generateLogo;
        const label = document.createElement('label');
        label.className = 'text-sm text-gray-500 mt-1 font-bold';
        label.textContent = `色${i + 1}`;
        colorDiv.appendChild(input);
        colorDiv.appendChild(label);
        container.appendChild(colorDiv);
      }
    }

    // --- 邊框功能 ---
    function addBorderLayer(color = '#000000', width = 2) {
      const layerId = Date.now() + Math.random();
      const layer = { id: layerId, width: width, color: color };
      borderLayers.push(layer);
      renderBorderLayers();
      generateLogo();
    }

    function removeBorderLayer(id) {
      borderLayers = borderLayers.filter(layer => layer.id !== id);
      renderBorderLayers();
      generateLogo();
    }

    function updateBorderLayer(id, property, value) {
      const layer = borderLayers.find(l => l.id === id);
      if (layer) {
        layer[property] = property === 'width' ? parseInt(value) : value;
        generateLogo();
      }
    }

    function renderBorderLayers() {
      const container = document.getElementById('borderLayers');
      container.innerHTML = '';
      borderLayers.forEach((layer, index) => {
        const layerDiv = document.createElement('div');
        layerDiv.className = 'flex items-center gap-4 p-4 bg-white rounded-xl border-2 border-purple-100 shadow-sm';
        layerDiv.innerHTML = `
          <span class="text-lg font-bold text-purple-600 min-w-[60px]">第 ${index + 1} 圈</span>
          <input type="color" value="${layer.color}" onchange="updateBorderLayer(${layer.id}, 'color', this.value)" class="w-12 h-12 rounded cursor-pointer">
          <div class="flex items-center space-x-2">
            <span class="text-base font-bold">粗細:</span>
            <input type="number" min="0" max="50" value="${layer.width}" oninput="updateBorderLayer(${layer.id}, 'width', this.value)" class="w-20 p-2 text-xl border-2 border-gray-300 rounded text-center font-bold">
          </div>
          <button onclick="removeBorderLayer(${layer.id})" class="ml-auto bg-red-50 p-2 rounded-lg text-red-500 hover:bg-red-100 transition">🗑️</button>
        `;
        container.appendChild(layerDiv);
      });
    }

    // --- 核心繪圖邏輯 ---
    function generateLogo() {
      const canvas = document.getElementById('logoCanvas');
      const ctx = canvas.getContext('2d');
      const text = document.getElementById('textInput').value || '';
      const fontSize = parseInt(document.getElementById('fontSize').value);
      const angle = parseInt(document.getElementById('gradientAngle').value);
      const useShadow = document.getElementById('toggleShadow').checked;
      const lineHeightMultiplier = parseFloat(document.getElementById('lineHeight').value);
      const gradientType = document.getElementById('gradientType').value;
      const autoFitGradient = document.getElementById('autoFitGradient').checked;
      const colorInputs = document.querySelectorAll('.colorInput');

      const lines = text.split('\n');
      const lineHeight = fontSize * lineHeightMultiplier;
      const totalTextHeight = lines.length * lineHeight;
      
      // 動態調整解析度，確保文字大時不會模糊
      canvas.width = 1200; 
      canvas.height = Math.max(1000, totalTextHeight + 400);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `bold ${fontSize}px ${uploadedFont ? `"${uploadedFont}"` : '"GenSenRounded", "Microsoft JhengHei", sans-serif'}`;

      let textBounds = { minX: canvas.width, maxX: 0, minY: canvas.height, maxY: 0 };
      const startY = (canvas.height - totalTextHeight) / 2 + (lineHeight / 2);
      
      lines.forEach((line, index) => {
        const y = startY + index * lineHeight;
        const metrics = ctx.measureText(line);
        const w = metrics.width;
        textBounds.minX = Math.min(textBounds.minX, canvas.width/2 - w/2);
        textBounds.maxX = Math.max(textBounds.maxX, canvas.width/2 + w/2);
        textBounds.minY = Math.min(textBounds.minY, y - fontSize/2);
        textBounds.maxY = Math.max(textBounds.maxY, y + fontSize/2);
      });

      let gradient;
      if (gradientType === 'linear') {
        const rad = angle * Math.PI / 180;
        let x1, y1, x2, y2;
        if (autoFitGradient) {
          const cx = (textBounds.minX + textBounds.maxX) / 2;
          const cy = (textBounds.minY + textBounds.maxY) / 2;
          const diag = Math.sqrt(Math.pow(textBounds.maxX-textBounds.minX, 2) + Math.pow(textBounds.maxY-textBounds.minY, 2));
          x1 = cx - Math.cos(rad) * diag / 2;
          y1 = cy - Math.sin(rad) * diag / 2;
          x2 = cx + Math.cos(rad) * diag / 2;
          y2 = cy + Math.sin(rad) * diag / 2;
        } else {
          x1 = 0; y1 = 0; x2 = canvas.width; y2 = canvas.height;
        }
        gradient = ctx.createLinearGradient(x1, y1, x2, y2);
      } else {
        const cx = (textBounds.minX + textBounds.maxX) / 2;
        const cy = (textBounds.minY + textBounds.maxY) / 2;
        const r = Math.max(textBounds.maxX - textBounds.minX, textBounds.maxY - textBounds.minY) / 1.2;
        gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, r || 100);
      }

      colorInputs.forEach((input, i) => gradient.addColorStop(i/(colorInputs.length-1), input.value));
      
      // 繪製多層邊框
      const sortedBorders = [...borderLayers].sort((a, b) => b.width - a.width);
      sortedBorders.forEach(layer => {
        ctx.strokeStyle = layer.color;
        ctx.lineWidth = layer.width * 2;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        lines.forEach((line, index) => {
          ctx.strokeText(line, canvas.width / 2, startY + index * lineHeight);
        });
      });

      // 繪製文字填色與陰影
      if (useShadow) {
        ctx.shadowColor = "rgba(0,0,0,0.6)";
        ctx.shadowBlur = 15;
        ctx.shadowOffsetX = 8;
        ctx.shadowOffsetY = 8;
      }
      ctx.fillStyle = gradient;
      lines.forEach((line, index) => {
        ctx.fillText(line, canvas.width / 2, startY + index * lineHeight);
      });
      ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
    }

    function downloadPNG() {
      const canvas = document.getElementById('logoCanvas');
      const downloadWidth = parseInt(document.getElementById('downloadWidth').value) || 500;
      const downloadHeight = parseInt(document.getElementById('downloadHeight').value) || 500;
      
      const ctx = canvas.getContext('2d');
      const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = pixels.data;
      let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;

      for (let y = 0; y < canvas.height; y++) {
        for (let x = 0; x < canvas.width; x++) {
          const alpha = data[(y * canvas.width + x) * 4 + 3];
          if (alpha > 0) {
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
          }
        }
      }

      if (maxX < minX) {
        alert("請先輸入文字喔！");
        return;
      }

      const padding = 30; 
      const trimmedWidth = (maxX - minX) + padding * 2;
      const trimmedHeight = (maxY - minY) + padding * 2;
      
      const trimmedCanvas = document.createElement('canvas');
      trimmedCanvas.width = trimmedWidth;
      trimmedCanvas.height = trimmedHeight;
      const tCtx = trimmedCanvas.getContext('2d');
      tCtx.drawImage(canvas, minX - padding, minY - padding, trimmedWidth, trimmedHeight, 0, 0, trimmedWidth, trimmedHeight);

      const finalCanvas = document.createElement('canvas');
      finalCanvas.width = downloadWidth;
      finalCanvas.height = downloadHeight;
      const fCtx = finalCanvas.getContext('2d');
      
      const scale = Math.min(downloadWidth / trimmedWidth, downloadHeight / trimmedHeight) * 0.92;
      const scaledW = trimmedWidth * scale;
      const scaledH = trimmedHeight * scale;
      const offsetX = (downloadWidth - scaledW) / 2;
      const offsetY = (downloadHeight - scaledH) / 2;

      fCtx.drawImage(trimmedCanvas, 0, 0, trimmedWidth, trimmedHeight, offsetX, offsetY, scaledW, scaledH);

      const link = document.createElement('a');
      link.download = `祝賀文字_${Date.now()}.png`;
      link.href = finalCanvas.toDataURL('image/png');
      link.click();
    }

    window.onload = function() {
      // 預設三層：黑(1) -> 白(4) -> 黑(5)
      addBorderLayer('#000000', 1);
      addBorderLayer('#ffffff', 4);
      addBorderLayer('#000000', 5);
      
      initSuggestedGradients();
      updateColorPickers();
      
      // 預設套用第一個推薦配色
      applySuggestedGradient("吉祥如意(紅金)");

      const font = new FontFace('GenSenRounded', 'url(GenSenRounded2TW-H.otf)');
      font.load().then(f => {
        document.fonts.add(f);
        generateLogo();
      }).catch(() => generateLogo());
    };
  </script>
</body>
</html>
