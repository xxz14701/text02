<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="01.png">
  <title>漸層文字產生器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 載入自訂字型 */
    @font-face {
      font-family: 'GenSenRounded';
      src: url('GenSenRounded2TW-H.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    /* 針對操作優化的樣式 */
    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      background-color: #f3f4f6;
    }
    
    /* 加大滑桿的操作區域 */
    input[type=range] {
      height: 30px; 
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 28px;
      width: 28px;
      border-radius: 50%;
      background: #3b82f6;
      cursor: pointer;
      margin-top: -10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 8px;
      cursor: pointer;
      background: #d1d5db;
      border-radius: 4px;
    }
    
    /* 加大顏色選擇器 */
    input[type="color"] {
      height: 50px;
      width: 100%;
      padding: 2px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
    }

    /* 畫布背景，顯示透明度 */
    .canvas-container {
      background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%), 
                        linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #e5e7eb 75%), 
                        linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      background-color: white;
    }
  </style>
</head>
<body class="text-gray-800">

  <!-- 標題區 -->
  <header class="bg-blue-600 text-white p-6 text-center shadow-lg">
    <h1 class="text-3xl md:text-4xl font-bold tracking-wide">💛漸層文字💛</h1>
  </header>

  <div class="container mx-auto p-4 max-w-6xl">
    
    <div class="flex flex-col lg:flex-row gap-8">
      
      <!-- 左側:控制面板 -->
      <div class="w-full lg:w-1/2 space-y-6">
        
        <!-- 卡片 1: 文字輸入 -->
        <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-200">
          <h2 class="text-xl font-bold mb-4 text-blue-700 border-b pb-2 flex items-center">
            <span class="text-2xl mr-2">1️⃣</span> 輸入文字
          </h2>
          <div class="space-y-4">
            <div>
              <label class="block text-lg font-medium mb-2">請輸入想要顯示的文字:</label>
              <textarea id="textInput" rows="3" class="w-full p-4 text-xl border-2 border-gray-300 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition" placeholder="例如:早安你好\n平安喜樂" oninput="generateLogo()">早安你好&#10;平安喜樂</textarea>
            </div>
            
            <div>
              <label class="block text-lg font-medium mb-2">選擇電腦裡的字型 (選填):</label>
              <input type="file" id="fontUpload" accept=".ttf,.otf" class="block w-full text-lg text-gray-500 file:mr-4 file:py-3 file:px-6 file:rounded-full file:border-0 file:text-lg file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition cursor-pointer">
              <p style="color: #666; font-size: 0.9rem; margin-top: 5px;">💡 預設使用「源泉圓體」字型</p>
            </div>
          </div>
        </div>

        <!-- 卡片 2: 顏色設定 -->
        <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-200">
          <h2 class="text-xl font-bold mb-4 text-orange-600 border-b pb-2 flex items-center">
            <span class="text-2xl mr-2">2️⃣</span> 顏色調整
          </h2>
          
          <div class="space-y-6">
            <div>
              <label class="block text-lg font-medium mb-2">快速選擇建議配色:</label>
              <select id="suggestedGradient" onchange="applySuggestedGradient(this.value)" class="w-full p-3 text-lg border-2 border-gray-300 rounded-xl bg-white focus:border-orange-500 outline-none">
                <option value="">-- 點此選擇漂亮的配色 --</option>
              </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-lg font-medium mb-2">顏色數量:</label>
                <select id="colorStopCount" onchange="updateColorPickers(); generateLogo();" class="w-full p-3 text-lg border-2 border-gray-300 rounded-xl bg-white">
                  <option value="2">2 色</option>
                  <option value="3" selected>3 色</option>
                  <option value="4">4 色</option>
                  <option value="5">5 色</option>
                  <option value="6">6 色</option>
                  <option value="7">7 色</option>
                </select>
              </div>
              
              <div>
                <label class="block text-lg font-medium mb-2">漸層方向:</label>
                <select id="gradientType" onchange="generateLogo()" class="w-full p-3 text-lg border-2 border-gray-300 rounded-xl bg-white">
                  <option value="linear">直/橫向漸層 (線性)</option>
                  <option value="radial">同心圓漸層 (放射)</option>
                </select>
              </div>
            </div>

            <div>
              <label class="block text-lg font-medium mb-2">自訂顏色 (點擊色塊修改):</label>
              <div id="colorPickers" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3">
                <!-- JS 動態生成 -->
              </div>
            </div>

            <div>
              <label class="block text-lg font-medium mb-2">漸層角度 (旋轉):<span id="angleValue" class="text-blue-600 font-bold">0</span>°</label>
              <input type="range" id="gradientAngle" value="0" min="0" max="360" oninput="document.getElementById('angleValue').innerText=this.value; generateLogo()">
            </div>
            
            <div class="border-2 border-orange-200 rounded-xl p-4 bg-orange-50">
              <label class="block text-lg font-bold text-orange-700 mb-2">✨ 漸層範圍調整</label>
              <div class="flex items-center space-x-3 mb-2">
                <input type="checkbox" id="autoFitGradient" checked oninput="generateLogo()" class="w-6 h-6 text-orange-600 rounded focus:ring-orange-500 border-gray-300 cursor-pointer">
                <label for="autoFitGradient" class="text-base font-medium cursor-pointer select-none">自動貼合文字 (推薦)</label>
              </div>
            </div>
          </div>
        </div>

        <!-- 卡片 3: 外觀微調 -->
        <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-200">
          <h2 class="text-xl font-bold mb-4 text-purple-600 border-b pb-2 flex items-center">
            <span class="text-2xl mr-2">3️⃣</span> 外觀微調
          </h2>
          
          <div class="space-y-6">
            <div>
              <label class="block text-lg font-medium mb-2">文字大小:</label>
              <input type="range" id="fontSize" value="80" min="20" max="200" oninput="generateLogo()">
            </div>

            <div>
              <label class="block text-lg font-medium mb-2">行距大小:<span id="lineHeightValue" class="text-blue-600 font-bold">1.3</span>倍</label>
              <input type="range" id="lineHeight" value="1.3" min="0.8" max="3.0" step="0.1" oninput="document.getElementById('lineHeightValue').innerText=this.value; generateLogo()">
            </div>

            <!-- 多層邊框設定 -->
            <div class="border-2 border-purple-200 rounded-xl p-4 bg-purple-50">
              <div class="flex justify-between items-center mb-3">
                <label class="text-lg font-bold text-purple-700">文字邊框設定</label>
                <button onclick="addBorderLayer()" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg text-sm font-medium transition">
                  ➕ 新增邊框層
                </button>
              </div>
              <div id="borderLayers" class="space-y-3">
                <!-- 動態生成邊框層 -->
              </div>
              <p class="text-xs text-gray-600 mt-2">💡 繪製順序：清單中後面的圖層會被畫在前面（清單底部的圖層是最外圈）</p>
            </div>

            <div class="flex items-center space-x-3 p-3 bg-gray-50 rounded-xl">
              <input type="checkbox" id="toggleShadow" oninput="generateLogo()" class="w-6 h-6 text-blue-600 rounded focus:ring-blue-500 border-gray-300 cursor-pointer">
              <label for="toggleShadow" class="text-lg font-bold cursor-pointer select-none">開啟文字陰影 (更有立體感)</label>
            </div>
          </div>
        </div>

      </div>

      <!-- 右側:預覽與下載 -->
      <div class="w-full lg:w-1/2 lg:sticky lg:top-4 h-fit">
        <div class="bg-white p-6 rounded-2xl shadow-xl border-2 border-blue-100">
          <h2 class="text-2xl font-bold mb-4 text-center text-gray-800">
            <span class="text-3xl mr-2">👁️</span>預覽效果
          </h2>
          
          <div class="canvas-container rounded-xl overflow-hidden shadow-inner mb-6">
            <canvas id="logoCanvas" class="w-full h-auto"></canvas>
          </div>

          <div class="space-y-4">
            <h3 class="text-xl font-bold text-green-600 flex items-center border-b pb-2">
              <span class="text-2xl mr-2">💾</span>下載設定
            </h3>
            
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-base font-medium mb-1">寬度 (像素):</label>
                <input type="number" id="downloadWidth" value="370" class="w-full p-2 text-lg border-2 border-gray-300 rounded-lg">
              </div>
              <div>
                <label class="block text-base font-medium mb-1">高度 (像素):</label>
                <input type="number" id="downloadHeight" value="320" class="w-full p-2 text-lg border-2 border-gray-300 rounded-lg">
              </div>
            </div>

            <button onclick="downloadPNG()" class="w-full bg-gradient-to-r from-green-500 to-blue-500 hover:from-green-600 hover:to-blue-600 text-white py-4 px-6 rounded-xl text-xl font-bold shadow-lg hover:shadow-xl transition-all transform hover:scale-105 active:scale-95 flex items-center justify-center space-x-2">
              <span class="text-2xl">⬇️</span>
              <span>下載 PNG 圖片</span>
            </button>
            
            <p class="text-sm text-gray-600 text-center">Billy ^.^ | Program improved by AI @2026</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    let uploadedFont = null;
    let borderLayers = [];

    // --- 字型上傳功能 ---
    document.getElementById('fontUpload').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          const fontData = event.target.result;
          const fontName = file.name.replace(/\.[^/.]+$/, "");
          const newFont = new FontFace(fontName, `url(${fontData})`);
          
          newFont.load().then(function(loadedFont) {
            document.fonts.add(loadedFont);
            uploadedFont = fontName;
            generateLogo();
          }).catch(function(error) {
            console.error('字型載入失敗:', error);
          });
        };
        reader.readAsDataURL(file);
      }
    });

    // --- 建議配色 ---
    const suggestedGradients = {
      "日出橙黃": ["#FF6B6B", "#FFD93D", "#6BCF7F"],
      "海洋藍綠": ["#667eea", "#764ba2", "#f093fb"],
      "森林綠": ["#11998e", "#38ef7d"],
      "火焰紅": ["#f12711", "#f5af19"],
      "紫羅蘭": ["#C33764", "#1D2671"],
      "粉紅漸變": ["#ff9a9e", "#fecfef", "#ffecd2"],
      "藍色夢幻": ["#a1c4fd", "#c2e9fb"],
      "金色輝煌": ["#f7971e", "#ffd200"],
      "薄荷綠": ["#00b09b", "#96c93d"],
      "櫻花粉": ["#fbc2eb", "#a6c1ee"],
      "彩虹七色": ["#FF0000", "#FF7F00", "#FFFF00", "#00FF00", "#0000FF", "#4B0082", "#9400D3"]
    };

    function initSuggestedGradients() {
      const select = document.getElementById('suggestedGradient');
      for (const [name, colors] of Object.entries(suggestedGradients)) {
        const option = document.createElement('option');
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      }
    }

    function applySuggestedGradient(name) {
      if (!name) return;
      const colors = suggestedGradients[name];
      document.getElementById('colorStopCount').value = colors.length;
      updateColorPickers();
      const colorInputs = document.querySelectorAll('.colorInput');
      colorInputs.forEach((input, index) => {
        if (index < colors.length) input.value = colors[index];
      });
      generateLogo();
    }

    function updateColorPickers() {
      const count = parseInt(document.getElementById('colorStopCount').value);
      const container = document.getElementById('colorPickers');
      container.innerHTML = '';
      const defaultColors = ["#FF6B6B", "#FFD93D", "#6BCF7F", "#667eea", "#f093fb", "#38ef7d", "#f5af19"];
      for (let i = 0; i < count; i++) {
        const colorDiv = document.createElement('div');
        colorDiv.className = 'flex flex-col items-center';
        const input = document.createElement('input');
        input.type = 'color';
        input.className = 'colorInput';
        input.value = defaultColors[i % defaultColors.length];
        input.oninput = generateLogo;
        const label = document.createElement('label');
        label.className = 'text-xs text-gray-500 mt-1';
        label.textContent = `色 ${i + 1}`;
        colorDiv.appendChild(input);
        colorDiv.appendChild(label);
        container.appendChild(colorDiv);
      }
    }

    // --- 邊框功能 ---
    function addBorderLayer(color = '#000000', width = 2) {
      const layerId = Date.now() + Math.random();
      const layer = { id: layerId, width: width, color: color };
      borderLayers.push(layer);
      renderBorderLayers();
      generateLogo();
    }

    function removeBorderLayer(id) {
      borderLayers = borderLayers.filter(layer => layer.id !== id);
      renderBorderLayers();
      generateLogo();
    }

    function updateBorderLayer(id, property, value) {
      const layer = borderLayers.find(l => l.id === id);
      if (layer) {
        layer[property] = property === 'width' ? parseInt(value) : value;
        generateLogo();
      }
    }

    function renderBorderLayers() {
      const container = document.getElementById('borderLayers');
      container.innerHTML = '';
      borderLayers.forEach((layer, index) => {
        const layerDiv = document.createElement('div');
        layerDiv.className = 'flex items-center gap-3 p-3 bg-white rounded-lg border border-purple-200';
        layerDiv.innerHTML = `
          <span class="text-sm font-bold text-purple-600 min-w-[50px]">層級 ${index + 1}</span>
          <input type="color" value="${layer.color}" onchange="updateBorderLayer(${layer.id}, 'color', this.value)" class="w-10 h-10 rounded cursor-pointer">
          <input type="number" min="0" max="50" value="${layer.width}" oninput="updateBorderLayer(${layer.id}, 'width', this.value)" class="w-16 p-1 border-2 border-gray-300 rounded text-center">
          <span class="text-xs text-gray-400">px</span>
          <button onclick="removeBorderLayer(${layer.id})" class="ml-auto text-red-500">🗑️</button>
        `;
        container.appendChild(layerDiv);
      });
    }

    // --- 核心繪圖邏輯 ---
    function generateLogo() {
      const canvas = document.getElementById('logoCanvas');
      const ctx = canvas.getContext('2d');
      const text = document.getElementById('textInput').value || '';
      const fontSize = parseInt(document.getElementById('fontSize').value);
      const angle = parseInt(document.getElementById('gradientAngle').value);
      const useShadow = document.getElementById('toggleShadow').checked;
      const lineHeightMultiplier = parseFloat(document.getElementById('lineHeight').value);
      const gradientType = document.getElementById('gradientType').value;
      const autoFitGradient = document.getElementById('autoFitGradient').checked;
      const colorInputs = document.querySelectorAll('.colorInput');

      const lines = text.split('\n');
      const lineHeight = fontSize * lineHeightMultiplier;
      const totalTextHeight = lines.length * lineHeight;
      
      canvas.width = 1000; // 增加原始畫布解析度以便裁切
      canvas.height = Math.max(800, totalTextHeight + 400);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `bold ${fontSize}px ${uploadedFont ? `"${uploadedFont}"` : '"GenSenRounded", "Microsoft JhengHei", sans-serif'}`;

      // 計算文字邊界用於漸層貼合
      let textBounds = { minX: canvas.width, maxX: 0, minY: canvas.height, maxY: 0 };
      const startY = (canvas.height - totalTextHeight) / 2 + (lineHeight / 2);
      
      lines.forEach((line, index) => {
        const y = startY + index * lineHeight;
        const metrics = ctx.measureText(line);
        const w = metrics.width;
        textBounds.minX = Math.min(textBounds.minX, canvas.width/2 - w/2);
        textBounds.maxX = Math.max(textBounds.maxX, canvas.width/2 + w/2);
        textBounds.minY = Math.min(textBounds.minY, y - fontSize/2);
        textBounds.maxY = Math.max(textBounds.maxY, y + fontSize/2);
      });

      // 漸層設定
      let gradient;
      if (gradientType === 'linear') {
        const rad = angle * Math.PI / 180;
        let x1, y1, x2, y2;
        if (autoFitGradient) {
          const cx = (textBounds.minX + textBounds.maxX) / 2;
          const cy = (textBounds.minY + textBounds.maxY) / 2;
          const diag = Math.sqrt(Math.pow(textBounds.maxX-textBounds.minX, 2) + Math.pow(textBounds.maxY-textBounds.minY, 2));
          x1 = cx - Math.cos(rad) * diag / 2;
          y1 = cy - Math.sin(rad) * diag / 2;
          x2 = cx + Math.cos(rad) * diag / 2;
          y2 = cy + Math.sin(rad) * diag / 2;
        } else {
          x1 = 0; y1 = 0; x2 = canvas.width; y2 = canvas.height;
        }
        gradient = ctx.createLinearGradient(x1, y1, x2, y2);
      } else {
        const cx = (textBounds.minX + textBounds.maxX) / 2;
        const cy = (textBounds.minY + textBounds.maxY) / 2;
        const r = Math.max(textBounds.maxX - textBounds.minX, textBounds.maxY - textBounds.minY) / 1.2;
        gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, r || 100);
      }

      colorInputs.forEach((input, i) => gradient.addColorStop(i/(colorInputs.length-1), input.value));
      
      // 繪製多層邊框 (從最外層往內層畫)
      const sortedBorders = [...borderLayers].sort((a, b) => b.width - a.width);
      
      sortedBorders.forEach(layer => {
        ctx.strokeStyle = layer.color;
        ctx.lineWidth = layer.width * 2;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        lines.forEach((line, index) => {
          ctx.strokeText(line, canvas.width / 2, startY + index * lineHeight);
        });
      });

      // 繪製文字填色
      if (useShadow) {
        ctx.shadowColor = "rgba(0,0,0,0.5)";
        ctx.shadowBlur = 10;
        ctx.shadowOffsetX = 5;
        ctx.shadowOffsetY = 5;
      }
      ctx.fillStyle = gradient;
      lines.forEach((line, index) => {
        ctx.fillText(line, canvas.width / 2, startY + index * lineHeight);
      });
      // 清除陰影
      ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
    }

    // --- 還原原始檔案的精確裁切下載邏輯 ---
    function downloadPNG() {
      const canvas = document.getElementById('logoCanvas');
      const downloadWidth = parseInt(document.getElementById('downloadWidth').value);
      const downloadHeight = parseInt(document.getElementById('downloadHeight').value);
      
      // 1. 先找到畫布中有內容的最小範圍 (裁切透明邊緣)
      const ctx = canvas.getContext('2d');
      const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = pixels.data;
      let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;

      for (let y = 0; y < canvas.height; y++) {
        for (let x = 0; x < canvas.width; x++) {
          const alpha = data[(y * canvas.width + x) * 4 + 3];
          if (alpha > 0) {
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
          }
        }
      }

      // 如果畫布是空的
      if (maxX < minX || maxY < minY) {
          const msg = document.createElement('div');
          msg.className = 'fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-gray-800 text-white px-6 py-4 rounded-xl shadow-2xl z-50';
          msg.innerText = "畫布是空的，請先輸入文字喔！";
          document.body.appendChild(msg);
          setTimeout(() => msg.remove(), 2000);
          return;
      }

      // 2. 裁切出文字部分的畫布
      const padding = 20; // 留一點緩衝
      const trimmedWidth = (maxX - minX) + padding * 2;
      const trimmedHeight = (maxY - minY) + padding * 2;
      
      const trimmedCanvas = document.createElement('canvas');
      trimmedCanvas.width = trimmedWidth;
      trimmedCanvas.height = trimmedHeight;
      const tCtx = trimmedCanvas.getContext('2d');
      tCtx.drawImage(canvas, minX - padding, minY - padding, trimmedWidth, trimmedHeight, 0, 0, trimmedWidth, trimmedHeight);

      // 3. 將裁切後的內容縮放到指定的下載大小，並置中
      const finalCanvas = document.createElement('canvas');
      finalCanvas.width = downloadWidth;
      finalCanvas.height = downloadHeight;
      const fCtx = finalCanvas.width > 0 ? finalCanvas.getContext('2d') : null;
      
      if (fCtx) {
        // 計算等比例縮放比例，確保文字填滿但不會超出範圍
        const scale = Math.min(downloadWidth / trimmedWidth, downloadHeight / trimmedHeight) * 0.95; 
        const scaledW = trimmedWidth * scale;
        const scaledH = trimmedHeight * scale;
        const offsetX = (downloadWidth - scaledW) / 2;
        const offsetY = (downloadHeight - scaledH) / 2;

        fCtx.drawImage(trimmedCanvas, 0, 0, trimmedWidth, trimmedHeight, offsetX, offsetY, scaledW, scaledH);

        // 4. 下載
        const link = document.createElement('a');
        link.download = `漸層文字_${downloadWidth}x${downloadHeight}.png`;
        link.href = finalCanvas.toDataURL('image/png');
        link.click();
      }
    }

    // 初始化設定
    window.onload = function() {
      // 預設三層邊框
      addBorderLayer('#000000', 1);
      addBorderLayer('#ffffff', 4);
      addBorderLayer('#000000', 5);
      
      initSuggestedGradients();
      updateColorPickers();
      
      const font = new FontFace('GenSenRounded', 'url(GenSenRounded2TW-H.otf)');
      font.load().then(f => {
        document.fonts.add(f);
        generateLogo();
      }).catch(() => generateLogo());
    };
  </script>
</body>
</html>
